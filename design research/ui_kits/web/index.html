<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Little Bit of Luxe — Travel Blog</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="kit.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="HomePage.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="ArticlePage.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="SearchPage.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState(() => {
        return window.location.hash.replace('#', '') || 'home';
      });
      const [articleId, setArticleId] = useState('splendido');

      useEffect(() => {
        const onHash = () => setPage(window.location.hash.replace('#','') || 'home');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const go = (p, id) => {
        if (id) setArticleId(id);
        window.location.hash = p;
        window.scrollTo({ top: 0, behavior: 'auto' });
      };

      return (
        <React.Fragment>
          <Nav current={page} onNav={go} />
          {page === 'home'    && <HomePage onOpen={(id) => go('article', id)} onSearch={() => go('search')} />}
          {page === 'article' && <ArticlePage id={articleId} onOpen={(id) => go('article', id)} />}
          {page === 'search'  && <SearchPage onOpen={(id) => go('article', id)} />}
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
