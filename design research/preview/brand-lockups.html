<!doctype html>
<html><head><meta charset="utf-8"><title>Wordmark constructions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lockups { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .lockup { padding: 28px 24px; min-height: 200px; display: flex; flex-direction: column; gap: 12px; justify-content:center; }

  /* Stacked wordmark — matches the brand logo weight relationships:
     LITTLE / OF        → upright, light (300)
     BIT                → italic, light (300)
     LUXE               → italic, bold (700) — the heavy emphasis word
  */
  .word { font-family: var(--lbl-serif); font-size: 40px; line-height: 0.98; letter-spacing: -0.01em; font-weight: 300; }
  .word em { font-style: italic; font-weight: 300; }      /* BIT */
  .word .luxe { font-style: italic; font-weight: 700; }   /* LUXE — heaviest */

  .compact { display:flex; align-items:center; gap: 14px; }
  .compact .ww { font-family: var(--lbl-serif); font-size: 22px; line-height: 1; letter-spacing: -0.01em; font-weight: 300; }
  .compact .ww em { font-style: italic; font-weight: 300; }
  .compact .ww .luxe { font-style: italic; font-weight: 700; }

  /* Hairline divider — sub-pixel rule, between true 1px and 0.5px */
  .compact .divider {
    width: 1px;
    align-self: stretch;
    background: currentColor;
    opacity: 0.7;
    transform: scaleX(0.75); /* renders at ~0.75px */
    transform-origin: center;
    margin: 6px 0;
  }
  .compact .sub {
    font-family: var(--lbl-sans);
    font-size: 9px;
    font-weight: 400;                /* slimmer "TRAVEL BLOG" */
    letter-spacing: 0.32em;
    text-transform: uppercase;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0.85;
  }
</style></head>
<body>
<div class="card" style="padding:0;">
  <div class="lockups">
    <div class="lockup" style="background:#FAF8F2; color:#0D152D;">
      <div class="tok-label">Stacked · primary</div>
      <div class="word">LITTLE<br><em>BIT</em> OF<br><span class="luxe">LUXE</span></div>
    </div>
    <div class="lockup" style="background:#0D152D; color:#F4F1D3;">
      <div class="tok-label" style="color:rgba(245,242,205,0.55);">Compact · inline</div>
      <div class="compact">
        <div class="ww">LITTLE <em>BIT</em><br>OF <span class="luxe">LUXE</span></div>
        <div class="divider"></div>
        <div class="sub">TRAVEL<br>BLOG</div>
      </div>
    </div>
  </div>
</div>
</body></html>
