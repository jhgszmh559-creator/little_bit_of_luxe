<!doctype html>
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  label { font-family: var(--lbl-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; color: var(--lbl-ink-3); display:block; margin-bottom: 6px; }
  .field { display:flex; align-items:stretch; border: 1px solid var(--lbl-midnight); border-radius: 3px; background: #fff; overflow: hidden; }
  .field input { flex:1; border: 0; outline: 0; background: transparent; padding: 14px 16px; font-family: var(--lbl-sans); font-size: 15px; color: var(--lbl-ink); min-width: 0; }
  .field input::placeholder { color: var(--lbl-ink-4); }
  .field .btn { background: var(--lbl-midnight); color: var(--lbl-sand); border:0; padding: 0 22px; font-family: var(--lbl-sans); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; cursor:pointer; display:flex; align-items:center; }
  .search { display:flex; align-items:center; border-bottom: 1px solid var(--lbl-midnight); padding-bottom: 8px; }
  .search input { flex:1; border:0; outline:0; background:transparent; padding: 6px 0 6px 8px; font-family: var(--lbl-serif); font-size: 22px; color: var(--lbl-ink); font-style: italic; }
  .search input::placeholder { color: var(--lbl-ink-3); }
</style></head>
<body>
<div class="card">
  <div class="tok-label" style="margin-bottom:18px;">Inputs</div>
  <div class="row">
    <div>
      <label>Newsletter</label>
      <div class="field">
        <input type="email" placeholder="your@email.com"/>
        <button class="btn">Join</button>
      </div>
    </div>
    <div>
      <label>Search</label>
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0D152D" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="text" placeholder="Pantelleria, Splendido…"/>
      </div>
    </div>
  </div>
</div>
</body></html>
