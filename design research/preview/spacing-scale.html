<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .step { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .bar { background: var(--lbl-midnight); width: 28px; }
  .v { font-family: var(--lbl-sans); font-size: 11px; color: var(--lbl-ink-3); font-weight: 600; letter-spacing: 0.06em; }
  .n { font-family: var(--lbl-serif); font-size: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="tok-label" style="margin-bottom:18px;">Spacing · 4-pt grid</div>
  <div class="row">
    <div class="step"><div class="bar" style="height:4px;"></div><div class="n">1</div><div class="v">4</div></div>
    <div class="step"><div class="bar" style="height:8px;"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="step"><div class="bar" style="height:12px;"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="step"><div class="bar" style="height:16px;"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="step"><div class="bar" style="height:24px;"></div><div class="n">5</div><div class="v">24</div></div>
    <div class="step"><div class="bar" style="height:32px;"></div><div class="n">6</div><div class="v">32</div></div>
    <div class="step"><div class="bar" style="height:48px;"></div><div class="n">7</div><div class="v">48</div></div>
    <div class="step"><div class="bar" style="height:64px;"></div><div class="n">8</div><div class="v">64</div></div>
    <div class="step"><div class="bar" style="height:96px;"></div><div class="n">9</div><div class="v">96</div></div>
    <div class="step"><div class="bar" style="height:128px;"></div><div class="n">10</div><div class="v">128</div></div>
  </div>
</div>
</body></html>
