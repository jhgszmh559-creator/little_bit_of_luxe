<!doctype html>
<html><head><meta charset="utf-8"><title>Editorial labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:18px;">
    <div>
      <div class="tok-label" style="margin-bottom:6px;">Eyebrow · 12 · UPPER · 0.22em</div>
      <div class="lbl-eyebrow">HOTEL REVIEW · ITALY</div>
    </div>
    <hr class="hr hr--soft"/>
    <div>
      <div class="tok-label" style="margin-bottom:6px;">Lede · serif italic · 22</div>
      <div class="lbl-lede">Off the southern coast of Sicily, an island most people fly over has become the Mediterranean's least-bothered escape.</div>
    </div>
    <hr class="hr hr--soft"/>
    <div style="display:flex; gap:24px; align-items:baseline;">
      <div>
        <div class="tok-label" style="margin-bottom:6px;">Byline</div>
        <div class="lbl-byline">By Eliza Marchetti</div>
      </div>
      <div>
        <div class="tok-label" style="margin-bottom:6px;">Meta</div>
        <div class="lbl-meta">7 MIN READ · MAY 2026</div>
      </div>
      <div>
        <div class="tok-label" style="margin-bottom:6px;">Caption</div>
        <div class="lbl-caption">The courtyard, just after dawn.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
