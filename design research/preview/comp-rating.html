<!doctype html>
<html><head><meta charset="utf-8"><title>Star ratings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:center; gap: 18px; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { font-family: var(--lbl-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; color: var(--lbl-ink-3); width: 120px; }
  .stars { font-family: var(--lbl-serif); font-size: 24px; color: #B08442; letter-spacing: 0.06em; }
  .dim { color: rgba(176,132,66,0.25); }
  .score { font-family: var(--lbl-serif); font-size: 28px; color: var(--lbl-ink); letter-spacing: -0.01em; }
  .score em { font-style: italic; font-weight: 600; }
  .meta { font-family: var(--lbl-sans); font-size: 11px; color: var(--lbl-ink-3); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
</style></head>
<body>
<div class="card">
  <div class="tok-label" style="margin-bottom:18px;">Ratings · gold ★, no icons</div>
  <div class="row"><div class="lbl">5 / 5</div><div class="stars">★ ★ ★ ★ ★</div><div class="meta">Property class</div></div>
  <div class="row"><div class="lbl">4 / 5</div><div class="stars">★ ★ ★ ★ <span class="dim">★</span></div><div class="meta">Property class</div></div>
  <div class="row"><div class="lbl">Numeric</div><div class="score">9.<em>2</em> <span style="font-size:14px; color:var(--lbl-ink-3); letter-spacing:0.18em;">/ 10</span></div><div class="meta">Reviewer score</div></div>
</div>
</body></html>
